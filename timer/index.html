<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Days Countdown</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f4f4f4;
    }

    .card {
        text-align: center;
        display: flex;
        background: white;
        gap: 40px;
        justify-content: space-around;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }

    #days {
        font-size: 4rem;
        font-weight: bold;
        color: #0066cc;
    }
    #daysSince {
        font-size: 4rem;
        font-weight: bold;
        color: #0066cc;
    }
</style>
</head>
<body>

<div class="card">
    <h4>Days Left Until Your Departure</h4>
    <div id="days">...</div>
    <hr>
    <h4>Days Since You Arrived in Hell</h4>
    <div id="daysSince">...</div>

</div>

<script>
function countWorkingDays(startDate, endDate) {
    let count = 0;
    const current = new Date(startDate);

    const holidays = [
        "2026-01-01",
        "2026-01-19",
        "2026-02-16",
        "2026-05-25",
        "2026-06-19",
        "2026-07-03",
        "2026-09-07",
        "2026-10-12",
        "2026-11-11",
        "2026-11-26",
        "2026-12-25"
    ];

    while (current <= endDate) {
        const day = current.getDay();

        const dateString = current.toISOString().split("T")[0];

        if (
            day >= 1 &&
            day <= 5 &&
            !holidays.includes(dateString)
        ) {
            count++;
        }

        current.setDate(current.getDate() + 1);
    }

    return count;
}

function updateCountdown() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // Days left until Dec 31, 2026
    const target = new Date("2026-12-31");
    let workingDays = countWorkingDays(today, target);

    if (workingDays < 0) {
        workingDays = 0;
    }

    document.getElementById("days").textContent =
        workingDays.toLocaleString();

    // Days since Oct 17, 2025
    const startDate = new Date("2025-10-17");
    startDate.setHours(0, 0, 0, 0);

    const daysSince = Math.floor(
        (today - startDate) / (1000 * 60 * 60 * 24)
    );

    document.getElementById("daysSince").textContent =
        daysSince.toLocaleString();
}

updateCountdown();

// Update every minute
setInterval(updateCountdown, 60000);
</script>

</body>
</html>
